<svg width="100%" viewBox="0 0 680 250" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <title>CrawlSage terminal demo</title>
  <desc>Running the QuotesToCsv sample: it scrapes ten quotes and writes a CSV file.</desc>
  <defs>
    <clipPath id="type">
      <rect x="44" y="55" width="0" height="20">
        <animate attributeName="width" values="0;0;338;338;338;0;0" keyTimes="0;0.04;0.20;0.92;0.95;0.99;1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="664" height="234" rx="10" fill="#0d1117" stroke="#30363d"/>
  <circle cx="32" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="26" r="6" fill="#febc2e"/>
  <circle cx="72" cy="26" r="6" fill="#28c840"/>
  <text x="340" y="30" text-anchor="middle" fill="#6e7681" font-size="12">samples/QuotesToCsv</text>
  <line x1="8" y1="44" x2="672" y2="44" stroke="#30363d"/>

  <text x="28" y="71" font-size="14" fill="#3fb950">$</text>
  <g clip-path="url(#type)">
    <text x="44" y="71" font-size="14" fill="#d2a8ff">dotnet run --project samples/QuotesToCsv</text>
  </g>
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.21;0.28;0.29;1" dur="8s" repeatCount="indefinite"/>
    <rect x="384" y="58" width="8" height="17" fill="#c9d1d9"/>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.33;0.93;0.97;1" dur="8s" repeatCount="indefinite"/>
    <text x="28" y="101" font-size="14" fill="#adbac7">Scraped 10 quotes -&gt; <tspan fill="#58a6ff">data/quotes.csv</tspan></text>
  </g>
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.45;0.93;0.97;1" dur="8s" repeatCount="indefinite"/>
    <text x="28" y="129" font-size="14" fill="#8b949e">  "The world as we have created it…" <tspan fill="#e3a857">— Albert Einstein</tspan></text>
  </g>
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.52;0.55;0.93;0.97;1" dur="8s" repeatCount="indefinite"/>
    <text x="28" y="155" font-size="14" fill="#8b949e">  "It is our choices, Harry…" <tspan fill="#e3a857">— J.K. Rowling</tspan></text>
  </g>
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.62;0.65;0.93;0.97;1" dur="8s" repeatCount="indefinite"/>
    <text x="28" y="181" font-size="14" fill="#8b949e">  "There are only two ways to live…" <tspan fill="#e3a857">— Albert Einstein</tspan></text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.72;0.74;1" dur="8s" repeatCount="indefinite"/>
    <text x="28" y="217" font-size="14" fill="#3fb950">$</text>
    <rect x="44" y="204" width="8" height="17" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.46;0.95;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
