name: Docs

# Builds the Jekyll site in /docs and deploys it to GitHub Pages.
# The Configure Pages step below provisions the Pages site itself (enablement: true), so no
# manual setup is normally needed. If a run still reports "Get Pages site failed" (e.g. an
# org policy blocks API enablement), switch it on once by hand:
#   repo Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # enablement: provision the Pages site from the workflow itself, so the first run
        # doesn't fail with "Get Pages site failed" when Pages was never switched on by hand.
        with:
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
