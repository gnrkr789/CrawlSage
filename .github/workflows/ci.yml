name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CrawlSage.slnx

      - name: Build
        run: dotnet build CrawlSage.slnx --configuration Release --no-restore

      - name: Test
        # Exclude browser tests (Category=Browser) — they need the Playwright Chromium
        # binary, which isn't installed on CI. Run them locally with --filter "Category=Browser".
        run: dotnet test CrawlSage.slnx --configuration Release --no-build --verbosity normal --filter "Category!=Browser" --collect:"XPlat Code Coverage"
