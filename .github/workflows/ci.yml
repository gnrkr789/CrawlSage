name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CrawlSage.slnx

      - name: Build
        run: dotnet build CrawlSage.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CrawlSage.slnx --configuration Release --no-build --verbosity normal
