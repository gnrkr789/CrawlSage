name: Release

# Tag-driven release. Push a `vX.Y.Z` tag to build, test, pack, and publish CrawlSage to
# nuget.org AND GitHub Packages (so it appears on the repo's Packages tab). Version from tag.
#
# One-time setup: add a repository secret NUGET_API_KEY
#   (Settings → Secrets and variables → Actions → New repository secret),
#   then release with, e.g.:
#       git tag v0.1.0 && git push origin v0.1.0
#
# Manual runs (workflow_dispatch) build and pack but never publish.

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # also publish to GitHub Packages (nuget.pkg.github.com)

jobs:
  release:
    name: Pack & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version from tag
        id: version
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" == v* ]]; then
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore CrawlSage.slnx

      - name: Build
        run: dotnet build CrawlSage.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test CrawlSage.slnx --configuration Release --no-build --filter "Category!=Browser"

      - name: Pack
        run: |
          dotnet pack src/CrawlSage/CrawlSage.fsproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./artifacts
          dotnet pack src/CrawlSage.Browser/CrawlSage.Browser.fsproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./artifacts
          dotnet pack src/CrawlSage.Extensions/CrawlSage.Extensions.fsproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./artifacts

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Also publish to GitHub Packages so the package appears on the repo's "Packages" tab.
      # Uses the auto-provided GITHUB_TOKEN (needs packages: write above); --no-symbols because
      # GitHub Packages rejects the .snupkg symbol package.
      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$GH_TOKEN" --source "https://nuget.pkg.github.com/gnrkr789/index.json" --skip-duplicate --no-symbols
